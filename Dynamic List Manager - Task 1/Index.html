<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Manager</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px;
        }
        h2 {
            text-align: center;
        }
        #itemInput {
            padding: 8px;
            width: 250px;
        }
        #addBtn {
            padding: 8px 12px;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }
        li {
            background: white;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        li:hover {
            background-color: #d1ecf1;   /* Highlight on hover */
        }
        .deleteBtn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        .deleteBtn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

    <h2>Dynamic List Manager</h2>

    <input type="text" id="itemInput" placeholder="Enter item">
    <button id="addBtn">Add Item</button>

    <ul id="itemList"></ul>

    <script>
        $(document).ready(function () {
            $("#addBtn").click(function () {

                let itemText = $("#itemInput").val().trim();

                if (itemText !== "") {

                    let newItem = `
                        <li>
                            ${itemText}
                            <button class="deleteBtn">Delete</button>
                        </li>
                    `;

                    $("#itemList").append(newItem);
                    $("#itemInput").val("");
                }
            });
            $("#itemList").on("click", ".deleteBtn", function () {
                $(this).parent().fadeOut(300, function () {
                    $(this).remove();
                });
            });
        });
    </script>
</body>
</html>
