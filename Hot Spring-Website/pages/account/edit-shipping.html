<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Shipping Address - HotSpring Portable Spas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
      <div class="container">
        <a class="navbar-brand" href="../../index.html"
          ><i class="fas fa-spa"></i> HotSpring Portable Spas</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../../index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../category.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="my-account.html"
                ><i class="fas fa-user"></i> Account</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="hero-section" style="padding: 3rem 0">
      <div class="container">
        <div class="hero-content">
          <h1 class="display-4">Edit Shipping Address</h1>
        </div>
      </div>
    </section>

    <section class="section-padding">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-3">
            <div class="account-sidebar">
              <ul class="list-group list-group-flush">
                <li class="list-group-item">
                  <a
                    href="my-account.html"
                    class="text-decoration-none text-dark d-block"
                    ><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a
                  >
                </li>
                <li class="list-group-item">
                  <a
                    href="edit-account.html"
                    class="text-decoration-none text-dark d-block"
                    ><i class="fas fa-user-edit me-2"></i> Edit Profile</a
                  >
                </li>
                <li class="list-group-item">
                  <a
                    href="order-summary.html"
                    class="text-decoration-none text-dark d-block"
                    ><i class="fas fa-shopping-bag me-2"></i> Orders</a
                  >
                </li>
                <li class="list-group-item">
                  <a
                    href="edit-billing.html"
                    class="text-decoration-none text-dark d-block"
                    ><i class="fas fa-credit-card me-2"></i> Billing Address</a
                  >
                </li>
                <li class="list-group-item active">
                  <i class="fas fa-truck me-2"></i> Shipping Address
                </li>
              </ul>
            </div>
          </div>

          <div class="col-lg-9">
            <div class="card">
              <div class="card-header bg-white">
                <h5 class="mb-0">Shipping Address</h5>
              </div>
              <div class="card-body p-4">
                <form id="shippingAddressForm">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="firstName" class="form-label"
                        >First Name *</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="firstName"
                        value="John"
                        required
                      />
                    </div>
                    <div class="col-md-6">
                      <label for="lastName" class="form-label"
                        >Last Name *</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="lastName"
                        value="Smith"
                        required
                      />
                    </div>
                    <div class="col-12">
                      <label for="address" class="form-label"
                        >Street Address *</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="address"
                        value="123 Main Street"
                        required
                      />
                    </div>
                    <div class="col-12">
                      <label for="address2" class="form-label"
                        >Apartment, suite, etc.</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="address2"
                        value="Apt 4B"
                      />
                    </div>
                    <div class="col-md-6">
                      <label for="city" class="form-label">City *</label>
                      <input
                        type="text"
                        class="form-control"
                        id="city"
                        value="New York"
                        required
                      />
                    </div>
                    <div class="col-md-3">
                      <label for="state" class="form-label">State *</label>
                      <select class="form-select" id="state" required>
                        <option value="NY" selected>New York</option>
                        <option value="CA">California</option>
                        <option value="TX">Texas</option>
                      </select>
                    </div>
                    <div class="col-md-3">
                      <label for="zip" class="form-label">ZIP Code *</label>
                      <input
                        type="text"
                        class="form-control"
                        id="zip"
                        value="10001"
                        required
                      />
                    </div>
                    <div class="col-12">
                      <label for="phone" class="form-label"
                        >Phone Number *</label
                      >
                      <input
                        type="tel"
                        class="form-control"
                        id="phone"
                        value="(555) 123-4567"
                        required
                      />
                    </div>
                    <div class="col-12">
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="defaultAddress"
                          checked
                        />
                        <label class="form-check-label" for="defaultAddress"
                          >Set as default shipping address</label
                        >
                      </div>
                    </div>
                  </div>
                  <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                      <i class="fas fa-save"></i> Save Address
                    </button>
                    <a href="my-account.html" class="btn btn-outline-secondary"
                      ><i class="fas fa-times"></i> Cancel</a
                    >
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom pt-3">
          <p>&copy; 2026 HotTub Store. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
